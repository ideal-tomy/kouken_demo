<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Equity Demo - Week4 Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Post-Meeting Analytics Dashboard</h1>
      <p>上段は判断、下段は根拠。AIは会議後分析を支援し、最終決裁は人間が実施。</p>
    </header>

    <main>
      <section class="panel">
        <div class="toolbar">
          <button id="generate-report" class="accent">自動レポート生成</button>
          <button id="toggle-report">レポート表示切替</button>
        </div>
      </section>

      <section class="kpi-grid" id="kpi-cards"></section>

      <section class="chart-grid">
        <article class="panel">
          <h3>発言エクイティ推移</h3>
          <div id="chart-participation"></div>
          <p class="hint">会議回ごとの発言エクイティ推移。低下時は発言偏在を確認。</p>
        </article>
        <article class="panel">
          <h3>ナッジ採否効果</h3>
          <div id="chart-nudge"></div>
          <p class="hint">採用率と改善効果を同時表示。見送りが多い場合は文言改善余地。</p>
        </article>
        <article class="panel">
          <h3>AI vs Human乖離分布</h3>
          <div id="chart-gap"></div>
          <p class="hint">乖離大の案件は判断基準差の候補。クリックで根拠を確認。</p>
        </article>
        <article class="panel">
          <h3>監査整合性</h3>
          <div id="chart-audit"></div>
          <p class="hint">hash整合と例外解除率。ガバナンス説明用の主要指標。</p>
        </article>
      </section>

      <section class="panel">
        <h3>AI所見</h3>
        <div id="insights"></div>
      </section>

      <section class="panel">
        <h3>根拠ドリルダウン</h3>
        <div id="drilldown"></div>
      </section>

      <section id="report-panel" class="panel hidden">
        <h3>自動レポート（1ページ要約）</h3>
        <div id="report-content"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
