<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Equity Demo - Week2 Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>AI Equity Demo / Week2 (Meeting Live)</h1>
      <p>AIは会議進行を支援。最終決裁は人間が行う。</p>
    </header>

    <main>
      <section id="view-top" class="view active">
        <div class="toolbar">
          <select id="filter-division"><option value="">全部門</option></select>
          <select id="filter-outcome">
            <option value="">全判定</option>
            <option value="Promote">Promote</option>
            <option value="Hold">Hold</option>
            <option value="Develop">Develop</option>
          </select>
          <select id="filter-risk">
            <option value="">全リスク</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
          </select>
        </div>
        <div id="candidate-grid" class="grid"></div>
      </section>

      <section id="view-p0" class="view">
        <button id="back-to-top" class="ghost-btn">← Topへ戻る</button>
        <div id="p0-header" class="panel"></div>
        <div class="layout-3col">
          <div class="panel"><h3>可視化（サマリ）</h3><div id="p0-charts"></div></div>
          <div class="panel"><h3>AI一次判定</h3><div id="p0-ai"></div></div>
          <div class="panel">
            <h3>警告・論点</h3>
            <div id="p0-risks"></div>
            <button id="open-evidence" class="accent-btn">根拠を詳細表示</button>
            <button id="start-meeting" class="accent-btn mt8">会議ライブ開始</button>
          </div>
        </div>
      </section>

      <section id="view-evidence" class="view">
        <button id="back-to-p0" class="ghost-btn">← P0へ戻る</button>
        <div class="panel">
          <h3>Evidence Explorer</h3>
          <div id="evidence-tabs" class="tabs"></div>
          <div id="evidence-list"></div>
        </div>
      </section>

      <section id="view-meeting" class="view">
        <button id="back-to-p0-from-meeting" class="ghost-btn">← P0へ戻る</button>
        <div class="panel">
          <h3>Meeting Live</h3>
          <div class="toolbar">
            <select id="scenario-select"></select>
            <button id="run-scenario">シナリオ実行</button>
            <button id="reset-meeting">リセット</button>
          </div>
          <div class="meeting-layout">
            <div class="panel">
              <h4>進行状況</h4>
              <div id="agenda-progress"></div>
              <h4>発言バランス</h4>
              <div id="speaker-balance"></div>
              <h4>未発言者率</h4>
              <div id="silence-ratio"></div>
            </div>
            <div class="panel">
              <h4>発言タイムライン</h4>
              <div id="timeline"></div>
            </div>
            <div class="panel">
              <h4>AIナッジ</h4>
              <div id="nudge-panel"></div>
              <h4>イベントログ</h4>
              <div id="event-log"></div>
            </div>
          </div>
          <div class="panel mt12">
            <h4>9-Box会議中更新</h4>
            <div id="ninebox-view"></div>
            <div class="toolbar">
              <label>Human Performance <input id="human-performance" type="number" min="0" max="100" /></label>
              <label>Human Potential <input id="human-potential" type="number" min="0" max="100" /></label>
            </div>
            <textarea id="gap-reason" placeholder="乖離理由を記録（必須）"></textarea>
            <button id="save-gap" class="accent-btn mt8">乖離理由を保存</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
